# incident.yaml – Maschinenlesbares Schema
# Siehe: INCIDENT_YAML_FIELD_STANDARD.md
# Version: 1.0

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://linux-desktop-chat.local/qa/incidents/incident.schema"
title: "QA Incident YAML Schema"
version: "1.0"

# Top-Level
required: [schema_version, identity, detection, environment, classification, behavior, qa]

properties:
  schema_version:
    type: string
    const: "1.0"
    description: "Schema-Version für Validierung"

  identity:
    type: object
    required: [id, title, created, updated, source]
    properties:
      id:
        type: string
        pattern: "^INC-\\d{8}-\\d{3}$"
      title:
        type: string
        maxLength: 80
      created:
        type: string
        format: date-time
      updated:
        type: string
        format: date-time
      source:
        type: string
        enum: [production, staging, development, manual, audit, regression, other]
      reporter:
        type: string

  detection:
    type: object
    required: [when, how]
    properties:
      when:
        type: string
      how:
        type: string
        enum: [manual, test_failure, ci_failure, monitoring, audit, regression, other]
      context:
        type: string

  environment:
    type: object
    required: [runtime_layer]
    properties:
      runtime_layer:
        type: string
        enum: [ui, service, persistence, integration, startup, observability, cross_layer, other]
      platform:
        type: string
      python_version:
        type: string
      dependencies:
        type: array
        items: { type: string }
      config:
        type: [object, string]
      notes:
        type: string

  classification:
    type: object
    required: [failure_class, subsystem, severity, priority]
    properties:
      failure_class:
        type: string
        enum:
          - ui_state_drift
          - async_race
          - late_signal_use_after_destroy
          - request_context_loss
          - rag_silent_failure
          - debug_false_truth
          - startup_ordering
          - degraded_mode_failure
          - contract_schema_drift
          - metrics_false_success
          - tool_failure_visibility
          - optional_dependency_missing
      subsystem:
        type: string
        enum:
          - Chat
          - Agentensystem
          - Prompt-System
          - RAG
          - "Debug/EventBus"
          - Metrics
          - "Startup/Bootstrap"
          - Tools
          - "Provider/Ollama"
          - "Persistenz/SQLite"
      severity:
        type: string
        enum: [blocker, critical, high, medium, low, cosmetic]
      priority:
        type: string
        enum: [P0, P1, P2, P3]
      tags:
        type: array
        items: { type: string }

  behavior:
    type: object
    required: [description, expected, actual, repro_steps, reproducibility]
    properties:
      description:
        type: string
      expected:
        type: string
      actual:
        type: string
      repro_steps:
        type: array
        items: { type: string }
        minItems: 1
      reproducibility:
        type: string
        enum: [always, intermittent, once, unknown, requires_specific_state]
      impact:
        type: string

  evidence:
    type: object
    properties:
      refs:
        type: array
        items:
          type: object
          properties:
            file: { type: string }
            type:
              type: string
              enum: [screenshot, log, stacktrace, event_log, config, other]
            description: { type: string }

  analysis:
    type: object
    properties:
      root_cause: { type: string }
      affected_components:
        type: array
        items: { type: string }
      related_incidents:
        type: array
        items: { type: string, pattern: "^INC-" }
      notes: { type: string }

  resolution:
    type: object
    properties:
      fix: { type: string }
      fix_commit: { type: string }
      resolved_at: { type: string, format: date-time }
      verified: { type: boolean }

  qa:
    type: object
    required: [status]
    properties:
      status:
        type: string
        enum: [new, triaged, classified, replay_defined, replay_verified, bound_to_regression, closed, invalid, duplicate, archived]
      replay_id:
        type: string
        pattern: "^REPLAY-INC-\\d{8}-\\d{3}$"
      regression_test:
        type: string
      guarded:
        type: boolean
