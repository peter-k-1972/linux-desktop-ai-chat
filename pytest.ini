[pytest]
# Linux Desktop Chat â€“ Test-Konfiguration
# AusfĂĽhrung: pytest | pytest -v | pytest tests/unit | pytest tests/ui | pytest tests/smoke
# CI context_observability: pytest -m context_observability -v
# Model-Usage-/Quota-/Asset-Gate (schnell, ohne Live-Ollama/Qt-E2E): pytest -m model_usage_gate

testpaths = tests
pythonpath =
    .
    linux-desktop-chat-features/src
    linux-desktop-chat-ui-contracts/src
    linux-desktop-chat-pipelines/src
    linux-desktop-chat-providers/src
    linux-desktop-chat-cli/src
    linux-desktop-chat-utils/src
    linux-desktop-chat-projects/src
    linux-desktop-chat-workflows/src
    linux-desktop-chat-ui-themes/src
    linux-desktop-chat-ui-runtime/src
    linux-desktop-chat-infra/src
    linux-desktop-chat-runtime/src
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Marker fĂĽr Test-Kategorien
markers =
    unit: Unit-Tests (isolierte Komponenten)
    ui: UI-Tests (PySide6; pytest-qt optional, viele Tests nutzen qapplication + QTest)
    smoke: Smoke-Tests (grundlegende Workflows)
    gui_smoke: Registrierte GUIs â€” Subprozess-Kurzstart mit LINUX_DESKTOP_CHAT_GUI_SMOKE (Qt offscreen)
    integration: Integration-Tests (echte SQLite, ChromaDB, EventBus)
    live: Live-Tests (echte Ollama, RAG, Agent-AusfĂĽhrung â€“ erfordern laufende Dienste)
    slow: Langsame Tests (z.B. LLM-Aufrufe, Netzwerk)
    golden_path: Golden-Path E2E-Tests (echte BenutzerflĂĽsse)
    regression: Regression-Tests (reproduzieren bekannte Bugs)
    async_behavior: Async-sensitive Tests (Event-Loop, Race Conditions)
    contract: Contract Tests (ModulvertrĂ¤ge, Schnittstellen-StabilitĂ¤t)
    failure_mode: Failure-Injection-Tests (Fehlerszenarien simulieren)
    cross_layer: PrĂĽft mehrere Schichten (UIâ†”Serviceâ†”Persistenz)
    state_consistency: State-Consistency (UIâ†”Serviceâ†”Repositoryâ†”Persistenz)
    startup: Startup-Tests (App-Start unter verschiedenen Bedingungen)
    chaos: Chaos-Tests (kontrollierte Fault-Injection, Resilienz)
    # CI-Level (fĂĽr Stufenweise AusfĂĽhrung)
    fast: Schnelle Tests (Unit, Contract â€“ ohne DB/Netzwerk)
    full: VollstĂ¤ndige Suite (inkl. Integration, Async, Failure â€“ ohne Live)
    architecture: Architektur-Guard-Tests (Package-Struktur, Import-Richtungen)
    # Context Observability (Explainability, Inspection, Serializer, Snapshots)
    context_observability: Context-Explainability und Inspection (Resolver-Trace, Serializer-Determinismus, Snapshot-Regression)
    markdown_gate: Markdown Quality Gate (Klassifikation / Demos; optional erweiterbar)
    model_usage_gate: Subsystem-Gate Usage/Ledger, Aggregation, Quota/Preflight, instrumentierter Chat-Runtime, lokaler Asset-Scan (kein Live-Provider, kein Qt-E2E)

# AusfĂĽhrliche Fehlermeldungen
addopts = -ra -q
# FĂĽr mehr Details: -v
# FĂĽr nur Fehler: --tb=short

# Timeout fĂĽr langsame Tests (optional)
# timeout = 60
