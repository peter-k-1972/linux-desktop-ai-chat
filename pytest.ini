[pytest]
# Linux Desktop Chat – Test-Konfiguration
# Ausführung: pytest | pytest -v | pytest tests/unit | pytest tests/ui | pytest tests/smoke
# CI context_observability: pytest -m context_observability -v
# Model-Usage-/Quota-/Asset-Gate (schnell, ohne Live-Ollama/Qt-E2E): pytest -m model_usage_gate

testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Marker für Test-Kategorien
markers =
    unit: Unit-Tests (isolierte Komponenten)
    ui: UI-Tests (PySide6; pytest-qt optional, viele Tests nutzen qapplication + QTest)
    smoke: Smoke-Tests (grundlegende Workflows)
    integration: Integration-Tests (echte SQLite, ChromaDB, EventBus)
    live: Live-Tests (echte Ollama, RAG, Agent-Ausführung – erfordern laufende Dienste)
    slow: Langsame Tests (z.B. LLM-Aufrufe, Netzwerk)
    golden_path: Golden-Path E2E-Tests (echte Benutzerflüsse)
    regression: Regression-Tests (reproduzieren bekannte Bugs)
    async_behavior: Async-sensitive Tests (Event-Loop, Race Conditions)
    contract: Contract Tests (Modulverträge, Schnittstellen-Stabilität)
    failure_mode: Failure-Injection-Tests (Fehlerszenarien simulieren)
    cross_layer: Prüft mehrere Schichten (UI↔Service↔Persistenz)
    state_consistency: State-Consistency (UI↔Service↔Repository↔Persistenz)
    startup: Startup-Tests (App-Start unter verschiedenen Bedingungen)
    chaos: Chaos-Tests (kontrollierte Fault-Injection, Resilienz)
    # CI-Level (für Stufenweise Ausführung)
    fast: Schnelle Tests (Unit, Contract – ohne DB/Netzwerk)
    full: Vollständige Suite (inkl. Integration, Async, Failure – ohne Live)
    architecture: Architektur-Guard-Tests (Package-Struktur, Import-Richtungen)
    # Context Observability (Explainability, Inspection, Serializer, Snapshots)
    context_observability: Context-Explainability und Inspection (Resolver-Trace, Serializer-Determinismus, Snapshot-Regression)
    markdown_gate: Markdown Quality Gate (Klassifikation / Demos; optional erweiterbar)
    model_usage_gate: Subsystem-Gate Usage/Ledger, Aggregation, Quota/Preflight, instrumentierter Chat-Runtime, lokaler Asset-Scan (kein Live-Provider, kein Qt-E2E)

# Ausführliche Fehlermeldungen
addopts = -ra -q
# Für mehr Details: -v
# Für nur Fehler: --tb=short

# Timeout für langsame Tests (optional)
# timeout = 60
