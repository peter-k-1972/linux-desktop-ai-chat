# Vollständige pytest-Suite (Stabilisierung / Release-Gate)
# Install zieht linux-desktop-chat-features + linux-desktop-chat-ui-contracts + linux-desktop-chat-ui-runtime +
# linux-desktop-chat-ui-themes + linux-desktop-chat-pipelines + linux-desktop-chat-providers + linux-desktop-chat-utils +
# linux-desktop-chat-infra + linux-desktop-chat-runtime + linux-desktop-chat-cli (file:./…) mit —
# app.features / app.ui_contracts / app.ui_runtime / app.ui_themes / app.pipelines / app.providers / app.utils /
# app.debug / app.metrics / app.tools / app.runtime / app.extensions / app.cli
# nicht aus entfernten Host-Bäumen. Vgl. PACKAGE_PIPELINES_COMMIT3_CI.md, PACKAGE_PROVIDERS_COMMIT3_CI.md.
name: Pytest Full Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pytest-full:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      LDC_REPO_ROOT: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-3 libegl1 libgl1 libopengl0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Install project (core + rag + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[rag,dev]"
          pip install -e ./linux-desktop-chat-features
          pip install -e ./linux-desktop-chat-ui-contracts
          pip install -e ./linux-desktop-chat-ui-themes
          pip install -e ./linux-desktop-chat-ui-runtime
          pip install -e ./linux-desktop-chat-pipelines
          pip install -e ./linux-desktop-chat-providers
          pip install -e ./linux-desktop-chat-utils
          pip install -e ./linux-desktop-chat-infra
          pip install -e ./linux-desktop-chat-runtime
          pip install -e ./linux-desktop-chat-cli

      - name: Verify embedded app.* segments (installed)
        run: |
          python -c "import importlib.util as u; assert u.find_spec('app.features') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.ui_contracts') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.ui_themes') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.ui_runtime') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.pipelines') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.providers') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.utils') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.debug') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.metrics') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.tools') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.runtime') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.extensions') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.cli') is not None"
          python - <<'PY'
          import importlib.util
          assert importlib.util.find_spec("app.cli")
          print("cli ok")
          PY
          python - <<'PY'
          from app.providers import LocalOllamaProvider
          print("providers ok")
          PY

      - name: Pytest (collect-only)
        run: pytest --collect-only -q

      - name: Pytest (full suite)
        run: pytest -q --tb=short
