# Markdown Quality Gate — strukturelle Doku, Normalisierung, Render-Stabilität (lokal, deterministisch).
# Install: + editables für eingebettete Distributionen inkl. linux-desktop-chat-pipelines / linux-desktop-chat-providers / linux-desktop-chat-cli
# (PEP-621-Drift / einheitliches Monorepo-Setup).
name: Markdown Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  markdown-quality:
    runs-on: ubuntu-latest
    env:
      LDC_REPO_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[rag,dev]"
          pip install -e ./linux-desktop-chat-features
          pip install -e ./linux-desktop-chat-ui-contracts
          pip install -e ./linux-desktop-chat-pipelines
          pip install -e ./linux-desktop-chat-providers
          pip install -e ./linux-desktop-chat-cli

      - name: Verify app.cli (installed distribution)
        run: |
          python - <<'PY'
          import importlib.util
          assert importlib.util.find_spec("app.cli")
          print("cli ok")
          PY

      - name: Markdown quality gate (CI profile)
        run: |
          set +e
          python3 tools/run_markdown_quality_gate.py --quiet --profile ci
          code=$?
          if [ "$code" -eq 2 ]; then exit 2; fi
          if [ "$code" -eq 1 ]; then
            echo "::notice::Markdown gate: PASS_WITH_WARNINGS (siehe Summary in den Logs; lokal mit --profile strict prüfen)"
            exit 0
          fi
          exit 0

      - name: Markdown gate unit tests
        run: pytest tests/unit/test_markdown_quality_gate.py -q --tb=short
