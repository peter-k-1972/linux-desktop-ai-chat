# Context Observability CI Gate
#
# Ensures changes to context resolution do not silently break observability.
# Always runs: explainability, inspection service, serializer determinism, snapshot suite.
# No flaky tests, no timing-based assertions, no network/provider dependency.

name: Context Observability

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  context-observability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[rag,dev]"

      - name: Run context_observability tests
        run: pytest -m context_observability -v --tb=short
