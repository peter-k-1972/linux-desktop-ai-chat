# Context Observability CI Gate
#
# Install: Host editable + explizite editables für linux-desktop-chat-features /
# linux-desktop-chat-ui-contracts / linux-desktop-chat-ui-themes / linux-desktop-chat-ui-runtime / linux-desktop-chat-pipelines / linux-desktop-chat-providers / linux-desktop-chat-cli
# (Monorepo file:./…), vgl. PACKAGE_UI_CONTRACTS_COMMIT3_CI.md, PACKAGE_PIPELINES_COMMIT3_CI.md,
# PACKAGE_PROVIDERS_COMMIT3_CI.md.
#
# Ensures changes to context resolution do not silently break observability.
# Always runs: explainability, inspection service, serializer determinism, snapshot suite.
# No flaky tests, no timing-based assertions, no network/provider dependency.

name: Context Observability

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  context-observability:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      LDC_REPO_ROOT: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-3 libegl1 libgl1 libopengl0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[rag,dev]"
          pip install -e ./linux-desktop-chat-features
          pip install -e ./linux-desktop-chat-ui-contracts
          pip install -e ./linux-desktop-chat-ui-themes
          pip install -e ./linux-desktop-chat-ui-runtime
          pip install -e ./linux-desktop-chat-pipelines
          pip install -e ./linux-desktop-chat-providers
          pip install -e ./linux-desktop-chat-projects
          pip install -e ./linux-desktop-chat-infra
          pip install -e ./linux-desktop-chat-runtime
          pip install -e ./linux-desktop-chat-cli

      - name: Verify app.cli (installed distribution)
        run: |
          python - <<'PY'
          import importlib.util
          assert importlib.util.find_spec("app.cli")
          print("cli ok")
          PY

      - name: Run context_observability tests
        run: pytest -m context_observability -v --tb=short
