# Schnelles Gate: Model-Usage, Quota/Preflight, instrumentierter Runtime-Pfad, lokaler Asset-Scan
# Install: + editables linux-desktop-chat-features / linux-desktop-chat-ui-contracts /
# linux-desktop-chat-pipelines / linux-desktop-chat-providers / linux-desktop-chat-cli (Monorepo).
name: Model Usage Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  model-usage-gate:
    runs-on: ubuntu-latest
    env:
      LDC_REPO_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[rag,dev]"
          pip install -e ./linux-desktop-chat-features
          pip install -e ./linux-desktop-chat-ui-contracts
          pip install -e ./linux-desktop-chat-ui-themes
          pip install -e ./linux-desktop-chat-ui-runtime
          pip install -e ./linux-desktop-chat-pipelines
          pip install -e ./linux-desktop-chat-providers
          pip install -e ./linux-desktop-chat-infra
          pip install -e ./linux-desktop-chat-runtime
          pip install -e ./linux-desktop-chat-cli

      - name: Verify app.cli (installed distribution)
        run: |
          python - <<'PY'
          import importlib.util
          assert importlib.util.find_spec("app.cli")
          print("cli ok")
          PY

      - name: Pytest (model_usage_gate)
        run: pytest -m model_usage_gate -q --tb=short
