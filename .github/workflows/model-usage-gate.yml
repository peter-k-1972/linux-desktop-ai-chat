# Schnelles Gate: Model-Usage, Quota/Preflight, instrumentierter Runtime-Pfad, lokaler Asset-Scan
name: Model Usage Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  model-usage-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[rag,dev]"

      - name: Pytest (model_usage_gate)
        run: pytest -m model_usage_gate -q --tb=short
