# Interne Plugin-Validierung — Matrix ausschließlich aus PLUGIN_VALIDATION_SMOKE_PROFILES
# (tools/ci/release_matrix_ci.py print-internal-plugin-matrix-json). Kein Release, keine Artefakte,
# keine Erweiterung der offiziellen edition-smoke-matrix.
#
# Monorepo: ``app.features`` / ``app.ui_contracts`` / ``app.ui_themes`` / ``app.ui_runtime`` / ``app.pipelines`` / ``app.providers`` / ``app.debug`` (infra) aus
# ``linux-desktop-chat-features`` / ``linux-desktop-chat-ui-contracts`` / ``linux-desktop-chat-ui-themes`` /
# ``linux-desktop-chat-ui-runtime`` / ``linux-desktop-chat-pipelines`` / ``linux-desktop-chat-providers`` /
# ``linux-desktop-chat-infra`` / ``linux-desktop-chat-runtime`` / ``linux-desktop-chat-cli`` (Host pyproject: ``file:./…``).
# ``LDC_REPO_ROOT`` zeigt auf den Checkout, damit ``release_matrix`` u. a. ``tests/unit/features`` am Host-Root findet.
name: Plugin Validation Smoke (internal)

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - "linux-desktop-chat-features/**"
      - "linux-desktop-chat-ui-contracts/**"
      - "linux-desktop-chat-ui-themes/**"
      - "linux-desktop-chat-ui-runtime/**"
      - "linux-desktop-chat-pipelines/**"
      - "linux-desktop-chat-providers/**"
      - "linux-desktop-chat-infra/**"
      - "linux-desktop-chat-runtime/**"
      - "linux-desktop-chat-cli/**"
      - "examples/plugins/**"
      - "pyproject.toml"
      - ".github/workflows/plugin-validation-smoke.yml"
      - "tools/ci/release_matrix_ci.py"

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      LDC_REPO_ROOT: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-3 libegl1 libgl1 libopengl0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Install project (core + dev, für Validierung + Matrix-Export)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e ./linux-desktop-chat-features
          pip install -e ./linux-desktop-chat-ui-contracts
          pip install -e ./linux-desktop-chat-ui-themes
          pip install -e ./linux-desktop-chat-ui-runtime
          pip install -e ./linux-desktop-chat-pipelines
          pip install -e ./linux-desktop-chat-providers
          pip install -e ./linux-desktop-chat-infra
          pip install -e ./linux-desktop-chat-runtime
          pip install -e ./linux-desktop-chat-cli

      - name: Verify app.features + app.ui_contracts + app.ui_themes + app.ui_runtime + app.pipelines + app.providers + app.cli (installed distribution)
        run: |
          python -c "import importlib.util as u; s=u.find_spec('app.features'); assert s is not None, 'linux-desktop-chat-features missing — check pyproject and linux-desktop-chat-features/'"
          python -c "import importlib.util as u; s=u.find_spec('app.ui_contracts'); assert s is not None, 'linux-desktop-chat-ui-contracts missing — check pyproject and linux-desktop-chat-ui-contracts/'"
          python -c "import importlib.util as u; s=u.find_spec('app.ui_themes'); assert s is not None, 'linux-desktop-chat-ui-themes missing — check pyproject and linux-desktop-chat-ui-themes/'"
          python -c "import importlib.util as u; s=u.find_spec('app.ui_runtime'); assert s is not None, 'linux-desktop-chat-ui-runtime missing — check pyproject and linux-desktop-chat-ui-runtime/'"
          python -c "import importlib.util as u; s=u.find_spec('app.pipelines'); assert s is not None, 'linux-desktop-chat-pipelines missing — check pyproject and linux-desktop-chat-pipelines/'"
          python -c "import importlib.util as u; s=u.find_spec('app.providers'); assert s is not None, 'linux-desktop-chat-providers missing — check pyproject and linux-desktop-chat-providers/'"
          python -c "import importlib.util as u; s=u.find_spec('app.debug'); assert s is not None, 'linux-desktop-chat-infra missing — check pyproject and linux-desktop-chat-infra/'"
          python -c "import importlib.util as u; s=u.find_spec('app.runtime'); assert s is not None, 'linux-desktop-chat-runtime missing — check pyproject and linux-desktop-chat-runtime/'"
          python -c "import importlib.util as u; s=u.find_spec('app.cli'); assert s is not None, 'linux-desktop-chat-cli missing — check pyproject and linux-desktop-chat-cli/'"
          python - <<'PY'
          import importlib.util
          assert importlib.util.find_spec("app.cli")
          print("cli ok")
          PY
          python - <<'PY'
          from app.providers import LocalOllamaProvider
          print("providers ok")
          PY

      - name: Validate release matrix + emit internal plugin matrix
        id: emit
        run: |
          python tools/ci/release_matrix_ci.py validate
          echo 'matrix<<MATRIX_EOF' >> "$GITHUB_OUTPUT"
          python tools/ci/release_matrix_ci.py print-internal-plugin-matrix-json >> "$GITHUB_OUTPUT"
          echo 'MATRIX_EOF' >> "$GITHUB_OUTPUT"

  plugin-smoke:
    name: plugin-smoke (${{ matrix.edition }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      LDC_REPO_ROOT: ${{ github.workspace }}
      LDC_EDITION: ${{ matrix.edition }}
      LDC_IGNORE_TECHNICAL_AVAILABILITY: "1"
      LINUX_DESKTOP_CHAT_SINGLE_INSTANCE: "0"
      LINUX_DESKTOP_CHAT_SKIP_DEFAULT_PROJECT: "1"
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-3 libegl1 libgl1 libopengl0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Install project (editable + Extras aus interner Plugin-Matrix)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.pip_extras }}]"
          pip install -e ./linux-desktop-chat-features
          pip install -e ./linux-desktop-chat-ui-contracts
          pip install -e ./linux-desktop-chat-ui-themes
          pip install -e ./linux-desktop-chat-ui-runtime
          pip install -e ./linux-desktop-chat-pipelines
          pip install -e ./linux-desktop-chat-providers
          pip install -e ./linux-desktop-chat-infra
          pip install -e ./linux-desktop-chat-runtime
          pip install -e ./linux-desktop-chat-cli

      - name: Verify app.features + app.ui_contracts + app.ui_themes + app.ui_runtime + app.pipelines + app.providers + app.cli (installed distribution)
        run: |
          python -c "import importlib.util as u; assert u.find_spec('app.features') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.ui_contracts') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.ui_themes') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.ui_runtime') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.pipelines') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.providers') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.debug') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.runtime') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.cli') is not None"
          python - <<'PY'
          import importlib.util
          assert importlib.util.find_spec("app.cli")
          print("cli ok")
          PY
          python - <<'PY'
          from app.providers import LocalOllamaProvider
          print("providers ok")
          PY

      - name: Install demo plugin package (Entry-Point)
        if: matrix.install_demo_plugin == 'true'
        run: pip install -e examples/plugins/ldc_plugin_example

      - name: Internal plugin validation tests
        run: pytest -q --tb=short ${{ matrix.smoke_paths }}
