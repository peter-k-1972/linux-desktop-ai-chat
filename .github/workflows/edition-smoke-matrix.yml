# Edition-basierter Smoke-Lauf — Matrix aus app.features.release_matrix (keine duplizierten Editionslisten).
#
# Monorepo: ``app.features`` / ``app.ui_contracts`` / ``app.ui_themes`` / ``app.ui_runtime`` / ``app.pipelines`` / ``app.providers`` / ``app.debug`` (infra) / ``app.runtime`` (runtime) / ``app.cli`` mit ``pip install -e ".[…]"`` plus explizite
# editables auf ``linux-desktop-chat-features`` / ``linux-desktop-chat-ui-contracts`` / ``linux-desktop-chat-ui-themes`` / ``linux-desktop-chat-ui-runtime`` / ``linux-desktop-chat-pipelines`` / ``linux-desktop-chat-providers`` / ``linux-desktop-chat-infra`` / ``linux-desktop-chat-runtime`` / ``linux-desktop-chat-cli`` (file:./…).
# ``LDC_REPO_ROOT`` = Workspace für Matrix-/Pfad-Checks gegen ``tests/unit/features`` am Host-Root.
name: Edition Smoke (Release Matrix)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      LDC_REPO_ROOT: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-3 libegl1 libgl1 libopengl0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Install project (core + dev, für Matrix-/pyproject-Validierung)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e ./linux-desktop-chat-features
          pip install -e ./linux-desktop-chat-ui-contracts
          pip install -e ./linux-desktop-chat-ui-themes
          pip install -e ./linux-desktop-chat-ui-runtime
          pip install -e ./linux-desktop-chat-pipelines
          pip install -e ./linux-desktop-chat-providers
          pip install -e ./linux-desktop-chat-infra
          pip install -e ./linux-desktop-chat-runtime
          pip install -e ./linux-desktop-chat-cli

      - name: Verify app.features + app.ui_contracts + app.pipelines + app.providers + app.cli (installed distribution)
        run: |
          python -c "import importlib.util as u; assert u.find_spec('app.features') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.ui_contracts') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.pipelines') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.providers') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.debug') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.cli') is not None"
          python - <<'PY'
          import importlib.util
          assert importlib.util.find_spec("app.cli")
          print("cli ok")
          PY
          python - <<'PY'
          from app.providers import LocalOllamaProvider
          print("providers ok")
          PY

      - name: Validate release matrix + emit CI matrix
        id: emit
        run: |
          python tools/ci/release_matrix_ci.py validate
          echo 'matrix<<MATRIX_EOF' >> "$GITHUB_OUTPUT"
          python tools/ci/release_matrix_ci.py print-matrix-json >> "$GITHUB_OUTPUT"
          echo 'MATRIX_EOF' >> "$GITHUB_OUTPUT"

  edition-smoke:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      LDC_REPO_ROOT: ${{ github.workspace }}
      LDC_EDITION: ${{ matrix.edition }}
      LDC_IGNORE_TECHNICAL_AVAILABILITY: "1"
      LINUX_DESKTOP_CHAT_SINGLE_INSTANCE: "0"
      LINUX_DESKTOP_CHAT_SKIP_DEFAULT_PROJECT: "1"
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-3 libegl1 libgl1 libopengl0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Install project (editable + PEP-621-Extras laut Release-Matrix)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.pip_extras }}]"
          pip install -e ./linux-desktop-chat-features
          pip install -e ./linux-desktop-chat-ui-contracts
          pip install -e ./linux-desktop-chat-ui-themes
          pip install -e ./linux-desktop-chat-ui-runtime
          pip install -e ./linux-desktop-chat-pipelines
          pip install -e ./linux-desktop-chat-providers
          pip install -e ./linux-desktop-chat-infra
          pip install -e ./linux-desktop-chat-runtime
          pip install -e ./linux-desktop-chat-cli

      - name: Verify app.features + app.ui_contracts + app.pipelines + app.providers + app.cli (installed distribution)
        run: |
          python -c "import importlib.util as u; assert u.find_spec('app.features') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.ui_contracts') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.pipelines') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.providers') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.debug') is not None"
          python -c "import importlib.util as u; assert u.find_spec('app.cli') is not None"
          python - <<'PY'
          import importlib.util
          assert importlib.util.find_spec("app.cli")
          print("cli ok")
          PY
          python - <<'PY'
          from app.providers import LocalOllamaProvider
          print("providers ok")
          PY

      - name: Smoke tests (suggested_smoke_paths)
        run: pytest -q --tb=short ${{ matrix.smoke_paths }}
